name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{secrets.DOCKER_USERNAME}}
          password: ${{secrets.DOCKER_PASSWORD}}

      # Frontend Image
      - name: Build Frontend
        run : docker build -t ${{secrets.DOCKER_USERNAME}}/react-frontend ./frontend

      - name: push frontend
        run: docker push ${{secrets.DOCKER_USERNAME}}/react-frontend

    # Backend Image
      - name: Build Backend
        run: docker build -t ${{secrets.DOCKER_USERNAME}}/fastapi-backend ./backend

      - name: Push Backend
        run: docker push ${{ secrets.DOCKER_USERNAME }}/fastapi-backend
